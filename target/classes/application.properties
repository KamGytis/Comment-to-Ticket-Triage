# Server
server.port=${PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:mem:pulsedeskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Hugging Face
huggingface.api.token=${HF_TOKEN}
private final String modelUrl = "https://api-inference.huggingface.co/models/google/gemma-2-2b-it/v1/chat/completions";
    private final String modelName = "google/gemma-2-2b-it";