# H2 Database
spring.datasource.url=jdbc:h2:mem:pulsedeskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Hugging Face
huggingface.api.token=${HF_TOKEN}
huggingface.model.url=https://router.huggingface.co/novita/v3/openai/chat/completions
huggingface.model.name=meta-llama/llama-3.1-8b-instruct